name: Sync Labels

# Syncs the labels from .github/labels.yml to ALL (non-archived) repos in the
# SwBase org. Create-or-update: existing labels are left untouched and nothing
# is deleted.
#
# Uses the same GitHub App as the project sync. The app needs permission
# Issues: Read and write (labels fall under Issues) plus Metadata: Read to list
# the repos.

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.yml"
      - ".github/workflows/sync-labels.yml"

env:
  ORG: SwBase
  LABELS_FILE: .github/labels.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Sync labels to all repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ ! -f "$LABELS_FILE" ]]; then
            echo "$LABELS_FILE not found" >&2
            exit 1
          fi

          # --- Parse labels.yml (list of name/color/description blocks) ---
          # Each label is stored as "name<TAB>color<TAB>description".
          strip_quotes() { local v="$1"; v="${v#[\"\']}"; v="${v%[\"\']}"; printf '%s' "$v"; }

          labels=()
          name='' color='' description=''
          flush() { [[ -n "$name" ]] && labels+=("$name"$'\t'"$color"$'\t'"$description"); return 0; }

          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" =~ ^[[:space:]]*-[[:space:]]*name:[[:space:]]*(.+)$ ]]; then
              flush
              name="$(strip_quotes "$(echo "${BASH_REMATCH[1]}" | sed 's/[[:space:]]*$//')")"
              color=''; description=''
            elif [[ "$line" =~ ^[[:space:]]*color:[[:space:]]*(.+)$ ]]; then
              color="$(strip_quotes "$(echo "${BASH_REMATCH[1]}" | sed 's/[[:space:]]*$//')")"
            elif [[ "$line" =~ ^[[:space:]]*description:[[:space:]]*(.+)$ ]]; then
              description="$(strip_quotes "$(echo "${BASH_REMATCH[1]}" | sed 's/[[:space:]]*$//')")"
            fi
          done < "$LABELS_FILE"
          flush

          echo "Labels found: ${#labels[@]}"

          # --- Fetch all (non-archived) repos in the org ---
          mapfile -t repos < <(gh repo list "$ORG" --limit 1000 --no-archived --json nameWithOwner --jq '.[].nameWithOwner')
          if [[ ${#repos[@]} -eq 0 ]]; then
            echo "No repos found for org '$ORG'" >&2
            exit 1
          fi

          echo -e "Repos found: ${#repos[@]}\n"

          # create-or-update a single label, retrying transient errors (e.g. HTTP 5xx)
          # up to 3 times so one hiccup does not abort the whole run.
          create_label() {
            local attempt
            for attempt in 1 2 3; do
              if gh label create "$1" --repo "$2" --color "$3" --description "$4" --force; then
                return 0
              fi
              echo "::warning::Attempt $attempt failed for label '$1' in $2, retrying..."
              sleep $((attempt * 3))
            done
            return 1
          }

          # --- Sync labels to each repo ---
          failures=0
          for repo in "${repos[@]}"; do
            echo "==> $repo"
            for label in "${labels[@]}"; do
              IFS=$'\t' read -r l_name l_color l_description <<< "$label"
              if ! create_label "$l_name" "$repo" "$l_color" "$l_description"; then
                echo "::warning::Could not sync label '$l_name' to $repo after retries."
                failures=$((failures + 1))
              fi
            done
          done

          echo -e "\nDone. Labels synced to ${#repos[@]} repo(s), $failures label operation(s) failed."
          # Fail the run only if something actually stayed broken.
          [[ $failures -eq 0 ]]
